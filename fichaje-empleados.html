<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichaje · Vudú</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Nunito:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #111010;
  --surface: #1c1b1b;
  --surface2: #242323;
  --border: #2e2c2c;
  --border2: #3a3838;
  --cream: #f0ebe0;
  --red: #e63232;
  --red-dim: rgba(230,50,50,0.12);
  --green: #39d98a;
  --green-dim: rgba(57,217,138,0.12);
  --yellow: #f5c842;
  --yellow-dim: rgba(245,200,66,0.1);
  --muted: #6b6868;
  --text: #f0ebe0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* grain overlay */
body::after {
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.6;
}

.app { width:100%; max-width:480px; position:relative; z-index:1; }

/* ── LOGO ── */
.logo-wrap {
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:28px;
  animation: fadeDown 0.5s ease both;
}
@keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }

.logo-svg { width:70px; height:70px; margin-bottom:8px; }
.logo-name {
  font-family: 'Permanent Marker', cursive;
  font-size:22px;
  color: var(--cream);
  letter-spacing:1px;
  line-height:1;
}
.logo-sub {
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:4px;
}

/* ── LOGIN ── */
#login-screen {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 36px 28px;
  animation: fadeDown 0.4s ease both;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.login-title {
  font-family:'Permanent Marker',cursive;
  font-size:28px;
  color:var(--cream);
  margin-bottom:6px;
  line-height:1.1;
}
.login-title span { color:var(--red); }
.login-sub { font-size:13px; color:var(--muted); margin-bottom:28px; }

.field { margin-bottom:14px; }
.field label {
  display:block;
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:7px;
}
.field input {
  width:100%;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:13px 16px;
  font-family:'Nunito',sans-serif;
  font-size:15px;
  color:var(--text);
  outline:none;
  transition:border-color 0.2s;
}
.field input:focus { border-color:var(--red); }

.btn-login {
  width:100%;
  background:var(--red);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:15px;
  font-family:'Permanent Marker',cursive;
  font-size:17px;
  cursor:pointer;
  margin-top:6px;
  letter-spacing:1px;
  transition:transform 0.15s, opacity 0.15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-login:hover { opacity:0.88; transform:translateY(-1px); }
.btn-login:active { transform:scale(0.97); }

/* ── MAIN ── */
#main-screen { display:none; }

.topbar {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px; gap:12px;
}
.user-pill {
  display:flex; align-items:center; gap:10px;
}
.user-av {
  width:40px; height:40px; border-radius:50%;
  background:var(--red);
  display:flex; align-items:center; justify-content:center;
  font-family:'Permanent Marker',cursive;
  font-size:17px; color:#fff; flex-shrink:0;
}
.user-name { font-weight:900; font-size:15px; }
.user-dept { font-size:11px; color:var(--muted); }
.btn-out {
  background:transparent;
  border:1.5px solid var(--border);
  color:var(--muted);
  border-radius:8px;
  padding:7px 14px;
  font-family:'Nunito',sans-serif;
  font-size:12px; font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
}
.btn-out:hover { border-color:var(--muted); color:var(--text); }

/* CLOCK CARD */
.clock-card {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:18px;
  padding:28px 24px 24px;
  margin-bottom:16px;
  position:relative; overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.clock-card::before {
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--red);
  transition:background 0.4s;
}
.clock-card.inside::before { background:var(--green); }

.time-big {
  font-family:'Permanent Marker',cursive;
  font-size:58px;
  color:var(--cream);
  line-height:1;
  margin-bottom:4px;
  letter-spacing:-1px;
}
.date-line {
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:var(--muted);
  text-transform:capitalize;
  margin-bottom:20px;
}

.status-pill {
  display:inline-flex; align-items:center; gap:7px;
  padding:6px 14px; border-radius:100px;
  font-family:'DM Mono',monospace; font-size:11px;
  letter-spacing:0.5px;
  margin-bottom:22px;
  border:1.5px solid;
}
.status-pill.out { border-color:rgba(230,50,50,0.4); background:var(--red-dim); color:var(--red); }
.status-pill.in  { border-color:rgba(57,217,138,0.4); background:var(--green-dim); color:var(--green); }
.dot { width:7px;height:7px;border-radius:50%; }
.dot-out { background:var(--red); animation:blink 2s infinite; }
.dot-in  { background:var(--green); animation:pulseG 2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
@keyframes pulseG { 0%,100%{box-shadow:0 0 0 0 rgba(57,217,138,0.5)}60%{box-shadow:0 0 0 5px rgba(57,217,138,0)} }

/* FORM JORNADA */
.form-row { margin-bottom:12px; }
.form-row.two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.time-field label {
  display:block;
  font-family:'DM Mono',monospace;
  font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--muted); margin-bottom:6px;
}
.time-field input[type="date"],
.time-field input[type="time"] {
  width:100%; background:var(--bg);
  border:1.5px solid var(--border2);
  border-radius:10px; padding:11px 14px;
  font-family:'DM Mono',monospace; font-size:16px; color:var(--cream);
  outline:none; transition:border-color 0.2s;
  color-scheme: dark;
}
.time-field input[type="date"]:focus,
.time-field input[type="time"]:focus { border-color:var(--green); }

.btn-guardar {
  width:100%; background:var(--green); color:#0d1a12;
  border:none; border-radius:12px; padding:15px;
  font-family:'Permanent Marker',cursive; font-size:17px;
  cursor:pointer; margin-top:4px; letter-spacing:0.5px;
  transition:transform 0.15s, opacity 0.15s;
}
.btn-guardar:hover { opacity:0.88; transform:translateY(-1px); }
.btn-guardar:active { transform:scale(0.97); }


/* STATS */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.stat-c {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:16px 12px; text-align:center;
}
.stat-v {
  font-family:'Permanent Marker',cursive;
  font-size:22px; color:var(--yellow);
  margin-bottom:3px;
}
.stat-l { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

/* REGISTROS */
.sec-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.sec-lbl { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }

.btn-exp {
  background:var(--surface2);
  border:1.5px solid var(--border);
  color:var(--green);
  border-radius:8px; padding:7px 13px;
  font-family:'DM Mono',monospace; font-size:11px;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all 0.18s;
}
.btn-exp:hover { background:var(--green-dim); border-color:var(--green); }
.btn-clr { background:transparent; border:none; color:var(--muted); font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; transition:color 0.2s; }
.btn-clr:hover { color:var(--red); }

.reg-list {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:16px;
  overflow:hidden; max-height:320px; overflow-y:auto;
}
.reg-item {
  display:grid; grid-template-columns:1fr auto auto;
  align-items:center; gap:10px;
  padding:13px 18px;
  border-bottom:1px solid var(--border);
  transition:background 0.12s;
}
.reg-item:last-child { border-bottom:none; }
.reg-item:hover { background:var(--surface2); }
.reg-fecha { font-family:'DM Mono',monospace; font-size:12px; color:var(--text); }
.reg-fecha-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.reg-hora { font-family:'DM Mono',monospace; font-size:13px; text-align:right; }
.rh-e { color:var(--green); }
.rh-s { color:var(--red); }
.rh-p { color:var(--muted); font-size:10px; }
.reg-dur {
  font-family:'DM Mono',monospace; font-size:11px; color:var(--muted);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; padding:3px 9px; min-width:52px; text-align:center;
}
.empty-st { padding:44px 20px; text-align:center; color:var(--muted); font-size:13px; line-height:1.7; }

/* scrollbar */
.reg-list::-webkit-scrollbar { width:3px; }
.reg-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface);
  border:1.5px solid var(--red);
  color:var(--cream); padding:11px 22px;
  border-radius:100px;
  font-family:'DM Mono',monospace; font-size:12px;
  transition:transform 0.3s; z-index:9999; white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
}
.toast.ok { border-color:var(--green); }
.toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:420px){
  .time-big{font-size:44px}
  .stats-row{grid-template-columns:1fr 1fr}
  .stats-row .stat-c:last-child{grid-column:span 2}
}
</style>
</head>
<body>
<div class="app">

  <!-- LOGO -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- círculo -->
      <circle cx="50" cy="50" r="44" stroke="#f0ebe0" stroke-width="4.5" stroke-linecap="round"/>
      <!-- ojo X izquierdo -->
      <line x1="25" y1="30" x2="37" y2="42" stroke="#f0ebe0" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="37" y1="30" x2="25" y2="42" stroke="#f0ebe0" stroke-width="5.5" stroke-linecap="round"/>
      <!-- ojo X derecho -->
      <line x1="63" y1="30" x2="75" y2="42" stroke="#f0ebe0" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="75" y1="30" x2="63" y2="42" stroke="#f0ebe0" stroke-width="5.5" stroke-linecap="round"/>
      <!-- boca: línea curva simple como en la foto -->
      <path d="M32 66 Q50 72 68 66" stroke="#f0ebe0" stroke-width="4.5" stroke-linecap="round" fill="none"/>
      <!-- gotita / baba colgando del centro de la boca -->
      <line x1="50" y1="70" x2="50" y2="80" stroke="#f0ebe0" stroke-width="4" stroke-linecap="round"/>
      <circle cx="50" cy="83" r="3.5" fill="#f0ebe0"/>
    </svg>
    <div class="logo-name">Vudú</div>
    <div class="logo-sub">Sistema de fichaje</div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-title">Hola,<br><span>¿quién eres?</span></div>
    <div class="login-sub">Introduce tu nombre para fichar tus horas</div>
    <div class="field">
      <label>Tu nombre</label>
      <input type="text" id="nombre-input" placeholder="Ej: María García" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Puesto / Departamento</label>
      <input type="text" id="empresa-input" placeholder="Ej: Sala · Camarero/a" autocomplete="off"/>
    </div>
    <button class="btn-login" onclick="login()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Entrar
    </button>
  </div>

  <!-- MAIN -->
  <div id="main-screen">
    <div class="topbar">
      <div class="user-pill">
        <div class="user-av" id="av-letter"></div>
        <div>
          <div class="user-name" id="disp-name"></div>
          <div class="user-dept" id="disp-dept"></div>
        </div>
      </div>
      <button class="btn-out" onclick="logout()">Salir</button>
    </div>

    <div class="clock-card">
      <div class="time-big" id="reloj">00:00:00</div>
      <div class="date-line" id="fecha-disp"></div>

      <div class="form-row">
        <div class="time-field">
          <label>📅 Fecha</label>
          <input type="date" id="inp-fecha">
        </div>
      </div>
      <div class="form-row two-col">
        <div class="time-field">
          <label>▶ Entrada</label>
          <input type="time" id="inp-entrada" step="60">
        </div>
        <div class="time-field">
          <label>■ Salida</label>
          <input type="time" id="inp-salida" step="60">
        </div>
      </div>
      <button class="btn-guardar" onclick="guardarJornada()">+ Guardar jornada</button>
    </div>

    <div class="stats-row">
      <div class="stat-c"><div class="stat-v" id="st-hoy">—</div><div class="stat-l">Hoy</div></div>
      <div class="stat-c"><div class="stat-v" id="st-sem">—</div><div class="stat-l">Semana</div></div>
      <div class="stat-c"><div class="stat-v" id="st-dias">0</div><div class="stat-l">Días</div></div>
    </div>

    <div class="sec-bar">
      <div class="sec-lbl">// Mis registros</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-clr" onclick="borrar()">✕ Borrar</button>
        <button class="btn-exp" onclick="exportar()">⬇ Exportar CSV</button>
      </div>
    </div>
    <div class="reg-list" id="reg-list">
      <div class="empty-st">Aún sin registros.<br>¡Ficha tu primera entrada!</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let currentUser = null;

window.onload = () => {
  const s = localStorage.getItem('vudu_user');
  if (s) { currentUser = JSON.parse(s); mostrarApp(); }
  actualizarReloj();
  setInterval(actualizarReloj, 1000);
};

function actualizarReloj() {
  const n = new Date();
  document.getElementById('reloj').textContent = n.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('fecha-disp').textContent = n.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function login() {
  const n = document.getElementById('nombre-input').value.trim();
  const d = document.getElementById('empresa-input').value.trim();
  if (!n) { showToast('Introduce tu nombre'); return; }
  currentUser = { nombre:n, dept:d||'Equipo' };
  localStorage.setItem('vudu_user', JSON.stringify(currentUser));
  mostrarApp();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('vudu_user');
  document.getElementById('login-screen').style.display='block';
  document.getElementById('main-screen').style.display='none';
}

function mostrarApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  document.getElementById('disp-name').textContent=currentUser.nombre;
  document.getElementById('disp-dept').textContent=currentUser.dept;
  document.getElementById('av-letter').textContent=currentUser.nombre[0].toUpperCase();
  // fecha de hoy y horas por defecto del turno
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('inp-fecha').value = hoy;
  document.getElementById('inp-entrada').value = '20:00';
  document.getElementById('inp-salida').value  = '01:00';
  renderRegs();
  actualizarStats();
}

function storageKey() { return 'vudu_'+currentUser.nombre.replace(/\s+/g,'_').toLowerCase(); }
function getRegs() { return JSON.parse(localStorage.getItem(storageKey())||'[]'); }
function saveRegs(r) { localStorage.setItem(storageKey(), JSON.stringify(r)); }


const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwZ8dzQvaimvjjxMNQPyNwgmW55C4W7BmP8PhqTwL7o2vgT9FolpVt23w3EgbHeZH8Z/exec';

function enviarASheets(datos) {
  var params = Object.keys(datos).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(datos[k]);
  }).join('&');
  fetch(SHEETS_URL + '?' + params, {
    method: 'GET',
    mode: 'no-cors'
  }).catch(function(err) { console.log('Sin conexion, guardado local'); });
}
function guardarJornada() {
  const fechaRaw = document.getElementById('inp-fecha').value;
  const entrada  = document.getElementById('inp-entrada').value;
  const salida   = document.getElementById('inp-salida').value;

  if (!fechaRaw) { showToast('Elige una fecha'); return; }
  if (!entrada)  { showToast('Pon la hora de entrada'); return; }

  // Convertir fecha a formato dd/mm/yyyy
  const [y,m,d] = fechaRaw.split('-');
  const fecha = `${d}/${m}/${y}`;

  let duracion = '';
  let ts = new Date(`${fechaRaw}T${entrada}`).getTime();

  if (salida) {
    // si salida <= entrada, es turno de noche (salida al día siguiente)
    const msE = new Date(`${fechaRaw}T${entrada}`).getTime();
    let fechaSalida = fechaRaw;
    if (salida <= entrada) {
      // sumar un día
      const d2 = new Date(fechaRaw);
      d2.setDate(d2.getDate() + 1);
      fechaSalida = d2.toISOString().split('T')[0];
    }
    const msS = new Date(`${fechaSalida}T${salida}`).getTime();
    duracion = formatDur(msS - msE);
  }

  const regs = getRegs();
  // Evitar duplicado exacto
  if (regs.some(r => r.fecha===fecha && r.entrada===entrada)) {
    showToast('Ya existe un registro con esa fecha y entrada'); return;
  }

  regs.push({ fecha, entrada, salida: salida||'', duracion, ts });
  regs.sort((a,b) => a.ts - b.ts);
  saveRegs(regs);

  // Enviar a Google Sheets
  enviarASheets({
    nombre: currentUser.nombre,
    dept: currentUser.dept,
    fecha: fecha,
    entrada: entrada,
    salida: salida||'',
    duracion: duracion
  });

  // restaurar defaults del turno
  document.getElementById('inp-entrada').value = '20:00';
  document.getElementById('inp-salida').value  = '01:00';

  renderRegs();
  actualizarStats();
  showToast('✓ Jornada guardada', 'ok');
}


function renderRegs() {
  const regs=getRegs().slice().reverse();
  const el=document.getElementById('reg-list');
  if (!regs.length) { el.innerHTML='<div class="empty-st">Aún sin registros.<br>¡Ficha tu primera entrada!</div>'; return; }
  el.innerHTML=regs.map(r=>`
    <div class="reg-item">
      <div><div class="reg-fecha">${r.fecha}</div></div>
      <div>
        <div class="reg-hora rh-e">▶ ${r.entrada}</div>
        ${r.salida?`<div class="reg-hora rh-s">■ ${r.salida}</div>`:'<div class="rh-p">pendiente...</div>'}
      </div>
      <div class="reg-dur">${r.duracion||'...'}</div>
    </div>`).join('');
}

function actualizarStats() {
  const regs=getRegs();
  const hoy=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  const msHoy=regs.filter(r=>r.fecha===hoy&&r.duracion).reduce((a,r)=>a+durToMs(r.duracion),0);
  document.getElementById('st-hoy').textContent=msHoy?fmtCorto(msHoy):'—';
  const lun=startWeek();
  const msSem=regs.filter(r=>r.ts>=lun&&r.duracion).reduce((a,r)=>a+durToMs(r.duracion),0);
  const hSem=Math.floor(msSem/3600000);
  document.getElementById('st-sem').textContent=hSem?hSem+'h':'—';
  document.getElementById('st-dias').textContent=new Set(regs.map(r=>r.fecha)).size;
}

function startWeek(){const n=new Date(),d=n.getDay(),diff=d===0?-6:1-d,m=new Date(n);m.setDate(n.getDate()+diff);m.setHours(0,0,0,0);return m.getTime();}

function exportar() {
  const regs=getRegs();
  if (!regs.length){showToast('No hay registros');return;}
  const hoy=new Date().toLocaleDateString('es-ES');
  let csv=`Informe de Horas - ${currentUser.nombre}\nEmpresa: ${currentUser.dept}\nGenerado: ${hoy}\n\nFecha,Entrada,Salida,Duración\n`;
  regs.forEach(r=>{ csv+=`"${r.fecha}","${r.entrada}","${r.salida||'Pendiente'}","${r.duracion||''}"\n`; });
  const totalMs=regs.filter(r=>r.duracion).reduce((a,r)=>a+durToMs(r.duracion),0);
  csv+=`\nTOTAL HORAS,,,"${formatDur(totalMs)}"\n`;
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`horas_${currentUser.nombre.replace(/\s+/g,'_')}_${hoy.replace(/\//g,'-')}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ CSV exportado','ok');
}

function borrar(){
  if(!confirm('¿Borrar todos tus registros?'))return;
  localStorage.removeItem(storageKey());
  setEstado('out'); renderRegs(); actualizarStats();
  showToast('Registros borrados');
}

function formatDur(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return`${h}h ${m}m ${s}s`;}
function fmtCorto(ms){return`${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m`;}
function durToMs(d){if(!d)return 0;const hM=d.match(/(\d+)h/),mM=d.match(/(\d+)m/),sM=d.match(/(\d+)s/);return((hM?+hM[1]:0)*3600+(mM?+mM[1]:0)*60+(sM?+sM[1]:0))*1000;}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
