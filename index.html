<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fichaje Vudú</title>
</head>
<body style="font-family:sans-serif; text-align:center; padding:50px;">
    <h2>Fichaje Vudú</h2>
    <input type="text" id="nombre" placeholder="Nombre" value="Marcos"><br><br>
    <input type="date" id="fecha"><br><br>
    <input type="time" id="entrada"> Entrada<br><br>
    <input type="time" id="salida"> Salida<br><br>
    <button onclick="enviar()">Guardar Jornada</button>

    <script>
        // PEGA TU URL DE GOOGLE AQUÍ ABAJO
        const URL_GOOGLE = 'https://script.google.com/macros/s/AKfycbw6wZWqRk5DfytWUjsLAqEqpoO1P6bmOJd3zw_2ncKpynTSrFCPaIZivzGWfv6XgGK5jw/exec';

        async function enviar() {
            const params = new URLSearchParams({
                nombre: document.getElementById('nombre').value,
                fecha: document.getElementById('fecha').value,
                entrada: document.getElementById('entrada').value,
                salida: document.getElementById('salida').value
            });
            await fetch(URL_GOOGLE + '?' + params.toString());
            alert('Datos enviados a la hoja de cálculo');
        }
    </script>
</body>
</html>
